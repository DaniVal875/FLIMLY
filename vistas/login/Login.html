<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmly - Login</title>
  <link rel="stylesheet" href="Login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="title">🎬 Filmly</h1>
      <p class="subtitle">Comenta, califica y comparte tus películas favoritas</p>
      
      <form class="login-form" id="login-form">
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        
        <button type="submit" class="btn">Inicio Sesión</button>
      </form>
      
      <p class="extra">
        ¿No tienes cuenta? <a onclick="location.href='../registro/Registro.html'">Registrar aquí</a><br />
        ¿Olvidaste tu contraseña? <a onclick="location.href='../recover/Recover.html'">Recuperar aquí</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(event) {
      
      // 1. Prevenimos que la página se recargue
      event.preventDefault();
      
      const formData = new FormData(this);
      
      // 2. Enviamos los datos al controlador
      fetch('../../controladores/login_controller.php', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        // 3. Leemos la respuesta JSON (la que viste en tu imagen)
        if (data.success) {
          // Si es true, vamos al Home
          window.location.href = '../home/Home.html';
        } else {
          // Si es false, mostramos el popup
          alert(data.message);
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Ocurrió un error de conexión.');
      });
    });
  </script>
</body>
</html>
